<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cloud²ti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0eae2 0%, #e0d6cc 100%);
            font-family: 'Inter', sans-serif;
            color: #2c2b28;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .test-container {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            background: #fffefa;
            border-radius: 56px;
            box-shadow: 0 30px 55px -20px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }
        .hero {
            background: #2f2e2a;
            color: #faf3e4;
            padding: 1.6rem 1.8rem;
            text-align: center;
        }
        .hero h1 { font-size: 2rem; letter-spacing: -0.5px; font-weight: 800; }
        .hero p { opacity: 0.8; font-size: 0.85rem; margin-top: 6px; }
        .progress-section { padding: 1rem 1.8rem 0.2rem 1.8rem; background: #fffefa; }
        .progress-stats { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 600; color: #8e867a; margin-bottom: 0.4rem; }
        .progress-bar-bg { background: #e7dfd4; border-radius: 30px; height: 8px; width: 100%; overflow: hidden; }
        .progress-fill { background: #c44536; width: 0%; height: 100%; border-radius: 30px; transition: width 0.25s ease; }
        .quiz-content { padding: 1.2rem 1.8rem 1.8rem 1.8rem; }
        .question-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 2rem 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #efe6dc;
        }
        .q-num { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; color: #c44536; margin-bottom: 1rem; }
        .question-text { font-size: 1.45rem; font-weight: 600; line-height: 1.4; margin-bottom: 2rem; color: #1f1e1b; }
        .rating-row { display: flex; justify-content: space-between; gap: 0.7rem; flex-wrap: wrap; }
        .rating-btn {
            flex: 1; text-align: center; background: #f9f6ef; border-radius: 60px;
            padding: 0.75rem 0; font-weight: 600; font-size: 0.85rem;
            border: 1px solid #e5dbcf; cursor: pointer; transition: all 0.15s; color: #4b473f;
        }
        .rating-btn.selected { background: #c44536; border-color: #c44536; color: white; box-shadow: 0 6px 12px rgba(196,69,54,0.2); }
        .nav-buttons { display: flex; justify-content: space-between; gap: 1rem; margin-top: 0.5rem; }
        .btn { background: #ece4da; border: none; padding: 0.75rem 1.8rem; border-radius: 50px; font-weight: 600; font-family: inherit; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #2f2e2a; color: white; }
        .btn-primary:hover { background: #c44536; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #ddd2c4; }
        .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
        .entry-panel { padding: 2rem 1.8rem; text-align: center; }
        .mode-group { display: flex; gap: 1.2rem; justify-content: center; margin: 1.8rem 0; flex-wrap: wrap; }
        .mode-btn { background: #f0ede5; border: none; padding: 0.9rem 2rem; font-size: 1rem; font-weight: 700; border-radius: 60px; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .mode-btn:hover { background: #e2dcd0; transform: translateY(-2px); }
        .info-card { background: #f8f5ee; border-radius: 28px; padding: 1rem 1.2rem; font-size: 0.85rem; color: #6b6358; text-align: left; }
        .result-area { padding: 1.5rem 1.8rem 2rem 1.8rem; }
        .character-visual-box { background: #f3ede3; border-radius: 60px; padding: 1.2rem; margin-bottom: 1.2rem; display: flex; justify-content: center; align-items: center; min-height: 230px; }
        .result-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .svg-avatar { width: 180px; height: 180px; display: block; }
        .character-name { font-size: 2rem; font-weight: 800; text-align: center; margin-top: 0.5rem; }
        .character-desc { color: #5f5b52; line-height: 1.5; text-align: center; margin: 0.8rem 0; font-size: 0.95rem; white-space: pre-line; }
        .style-note { font-size: 0.7rem; text-align: center; color: #aa9f8c; margin-bottom: 1rem; }
        .scores-chart { background: #fcfaf5; border-radius: 32px; padding: 1.4rem; margin-top: 1rem; }
        .chart-item { margin-bottom: 1rem; }
        .chart-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; }
        .bar-bg { background: #e3dbd0; border-radius: 20px; height: 10px; overflow: hidden; }
        .bar-fill { background: #c44536; width: 0%; height: 100%; border-radius: 20px; }
        .reset-btn { background: #2f2e2a; color: white; display: block; margin: 1.5rem auto 0.5rem; padding: 0.7rem 2rem; width: fit-content; cursor: pointer; border: none; border-radius: 50px; font-weight: 600; }
        footer { font-size: 0.65rem; text-align: center; padding: 1rem; color: #bcb0a0; border-top: 1px solid #eee6dc; }
        @media (max-width: 550px) { .question-text { font-size: 1.2rem; } .rating-btn { font-size: 0.7rem; padding: 0.6rem 0; } .quiz-content { padding: 1rem; } }
    </style>
</head>

        { dimension: 'A', reverse: true,  textYun: "节目分组考核，比起要和其他人合作的二重唱和三重唱，你更愿意选择自己一个人进独唱的房间", textRoad: "节目分组考核，比起要和其他人合作的二重唱和三重唱，你更愿意选择自己一个人进独唱的房间" },
        { dimension: 'N', reverse: false, textYun: "艺考时你发现和你同组的考生有老艺术家的专业水平，你会感到绝对的崩溃", textRoad: "艺考时你发现和你同组的考生有老艺术家的专业水平，你会感到绝对的崩溃" },
        { dimension: 'N', reverse: false, textYun: "假如你是一名音乐剧演员，下班后你会在社交平台上疯狂浏览观众的repo和对自己的评价", textRoad: "假如你是一名音乐剧演员，下班后你会在社交平台上疯狂浏览观众的repo和对自己的评价" },
        { dimension: 'N', reverse: false, textYun: "假如你是一名音乐剧演员，你的某些做法触怒了5号包厢的魅影，他要拿吊灯砸你，你此时很容易慌乱紧张，难以保持沉着冷静", textRoad: "面对突发的意外状况，我很容易慌乱紧张，难以保持沉着冷静" },
        { dimension: 'N', reverse: true,  textYun: "假如你是一名刚刚大学毕业的音乐剧演员，第一次担任商演剧男主角，在上台前夕你因为紧张而失声，但你也会努力调整好自己的状态，用完美的演出回馈观众", textRoad: "假如你是一名刚刚大学毕业的音乐剧演员，在担任商演剧男主角时，上台前夕你因为紧张而失声，但你也会努力调整好自己的状态，用完美的演出回馈观众" },
        { dimension: 'N', reverse: true,  textYun: "你是一个像草原和大海一样胸怀宽广且无忧无虑的人", textRoad: "你是一个像草原和大海一样胸怀宽广且无忧无虑的人" }
    ];
    const TOTAL_QS = QUESTION_SET.length;

    let currentMode = null;
    let answers = new Array(TOTAL_QS).fill(null);
    let currentIndex = 0;
    let matchedCharacter = null;
    let stdScores = null;
    const app = document.getElementById('appRoot');

    function getClothingPath(role) {
        const id = role.id;
        if (id === "Angel") return '<path d="M62 96 L138 96 L148 172 L52 172 Z" fill="#e63946"/><rect x="72" y="98" width="56" height="12" fill="#f4a261" rx="4"/><path d="M92 170 L92 186 L108 186 L108 170" fill="#ffb3c6"/>';
        if (id === "纳木海") return '<path d="M62 96 L138 96 L146 172 L54 172 Z" fill="#2a6f4f"/><rect x="70" y="90" width="60" height="10" fill="#d4a373" rx="3"/><circle cx="100" cy="85" r="12" fill="#bc6c25"/>';
        if (id === "安东尼") return '<path d="M62 96 L138 96 L148 172 L52 172 Z" fill="#6c757d"/><rect x="68" y="94" width="64" height="8" fill="#2d6a4f" rx="2"/>';
        if (id === "姚远") return '<path d="M62 96 L138 96 L146 172 L54 172 Z" fill="#1e6091"/><rect x="52" y="148" width="96" height="28" fill="#6b705c" rx="6"/><rect x="122" y="120" width="18" height="28" fill="#cb997e" rx="3"/>';
        if (id === "杨晓宇") return '<path d="M58 96 L142 96 L150 172 L50 172 Z" fill="#2b2b2b"/><path d="M68 102 L132 102 L126 130 L74 130 Z" fill="#4a4e69"/><circle cx="100" cy="148" r="9" fill="#a7a7a7"/>';
        if (id === "罗密欧") return '<path d="M60 96 L140 96 L148 172 L52 172 Z" fill="#3b6e8f"/><path d="M74 94 L126 94 L126 104 L74 104 Z" fill="#e9c46a"/><path d="M84 112 L116 112 L112 130 L88 130 Z" fill="#f4a261"/>';
        if (id === "Michael") return '<path d="M62 96 L138 96 L148 172 L52 172 Z" fill="#5e6472"/><rect x="78" y="88" width="44" height="10" fill="#b08968" rx="4"/><circle cx="100" cy="102" r="12" fill="#2f3e46"/>';
        if (id === "周望高") return '<path d="M62 96 L138 96 L148 172 L52 172 Z" fill="#4a4e69"/><path d="M78 92 L122 92 L122 100 L78 100 Z" fill="#b8c0c0"/>';
        if (id === "方凯毅") return '<path d="M58 96 L142 96 L150 172 L50 172 Z" fill="#9c7c5b"/><path d="M70 94 L130 94 L136 102 L64 102 Z" fill="#d4a373"/><rect x="88" y="140" width="24" height="32" fill="#3e5c4a" rx="4"/>';
        if (id === "工欲善") return '<path d="M62 96 L138 96 L146 172 L54 172 Z" fill="#bc9a6c"/><rect x="84" y="102" width="32" height="12" fill="#a3b18a" rx="4"/>';
        if (id === "伊本") return '<path d="M58 96 L142 96 L150 172 L50 172 Z" fill="#8b5a2b"/><path d="M68 102 L132 102 L126 142 L74 142 Z" fill="#b07d62"/>';
        if (id === "贺同") return '<path d="M62 96 L138 96 L148 172 L52 172 Z" fill="#2c7da0"/><rect x="72" y="96" width="56" height="10" fill="#f8f9fa" rx="4"/>';
        return '<path d="M62 96 L138 96 L146 172 L54 172 Z" fill="' + role.mainColor + '" opacity="0.9"/>';
    }
    
    function generateRoleSVG(role) {
        return '<svg class="svg-avatar" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">' +
            '<rect width="200" height="200" fill="#f3ede3" rx="90"/>' +
            '<circle cx="100" cy="68" r="26" fill="#E0BC8C" stroke="#C49A6C" stroke-width="1.2"/>' +
            '<circle cx="90" cy="64" r="2.5" fill="#3e2a21"/><circle cx="110" cy="64" r="2.5" fill="#3e2a21"/>' +
            '<path d="M92 78 Q100 85 108 78" stroke="#8b5a2b" stroke-width="1.8" fill="none" stroke-linecap="round"/>' +
            getClothingPath(role) +
        '</svg>';
    }

    function computeMatch() {
        let raw = { O:0, C:0, E:0, A:0, N:0 };
        for (let i=0; i<TOTAL_QS; i++) {
            let score = answers[i];
            const q = QUESTION_SET[i];
            if (q.reverse) score = 6 - score;
            raw[q.dimension] += score;
        }
        const O_std = Math.min(100, Math.max(0, (raw.O - 5) / 20 * 100));
        const C_std = Math.min(100, Math.max(0, (raw.C - 6) / 24 * 100));
        const E_std = Math.min(100, Math.max(0, (raw.E - 6) / 24 * 100));
        const A_std = Math.min(100, Math.max(0, (raw.A - 6) / 24 * 100));
        const N_std = Math.min(100, Math.max(0, (raw.N - 5) / 20 * 100));
        stdScores = { O: O_std, C: C_std, E: E_std, A: A_std, N: N_std };

        let best = null, minDev = Infinity;
        for (let i=0; i<ROLES.length; i++) {
            const role = ROLES[i];
            const inRange = function(v,min,max){ return v>=min && v<=max; };
            if (inRange(O_std,role.openMin,role.openMax) && inRange(C_std,role.consMin,role.consMax) && inRange(E_std,role.extMin,role.extMax) && inRange(A_std,role.agreeMin,role.agreeMax) && inRange(N_std,role.neuroMin,role.neuroMax)) {
                best = role; break;
            }
            let dev = 0;
            dev += O_std<role.openMin ? role.openMin-O_std : (O_std>role.openMax ? O_std-role.openMax : 0);
            dev += C_std<role.consMin ? role.consMin-C_std : (C_std>role.consMax ? C_std-role.consMax : 0);
            dev += E_std<role.extMin ? role.extMin-E_std : (E_std>role.extMax ? E_std-role.extMax : 0);
            dev += A_std<role.agreeMin ? role.agreeMin-A_std : (A_std>role.agreeMax ? A_std-role.agreeMax : 0);
            dev += N_std<role.neuroMin ? role.neuroMin-N_std : (N_std>role.neuroMax ? N_std-role.neuroMax : 0);
            if (dev < minDev) { minDev = dev; best = role; }
        }
        matchedCharacter = best || ROLES[0];
    }

    function renderEntry() {
        app.innerHTML = '<div class="hero"><h1>🎭 Cloud² 测试</h1><p>大五人格 · 音乐剧角色镜像</p></div>' +
            '<div class="entry-panel"><h3>✨ 选择你的版本 ✨</h3><div class="mode-group">' +
            '<button class="mode-btn" data-mode="yun">💜 我是云女</button><button class="mode-btn" data-mode="road">🌿 我是路人</button></div>' +
            '<div class="info-card">📌 基于大五人格模型，共28题，每题单独作答。<br>评分：1=完全不符合　2=不太符合　3=一般　4=比较符合　5=完全符合</div></div>';
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                currentMode = this.getAttribute('data-mode');
                answers.fill(null);
                currentIndex = 0;
                renderQuiz();
            });
        });
    }

    function renderQuiz() {
        const isYun = currentMode === 'yun';
        const q = QUESTION_SET[currentIndex];
        const questionText = isYun ? q.textYun : q.textRoad;
        const selectedVal = answers[currentIndex];
        const progressPercent = (currentIndex / TOTAL_QS) * 100;
        let ratingHtml = '';
        for (let s=1; s<=5; s++) {
            ratingHtml += '<div class="rating-btn ' + (selectedVal===s ? 'selected' : '') + '" data-score="' + s + '">' + s + '</div>';
        }
        app.innerHTML = '<div class="hero"><h1>📋 ' + (isYun ? '云女版' : '路人版') + '</h1><p>遵从内心 · 逐题作答</p></div>' +
            '<div class="progress-section"><div class="progress-stats"><span>第 ' + (currentIndex+1) + ' / ' + TOTAL_QS + ' 题</span><span>' + Math.round(progressPercent) + '%</span></div>' +
            '<div class="progress-bar-bg"><div class="progress-fill" style="width: ' + progressPercent + '%;"></div></div></div>' +
            '<div class="quiz-content"><div class="question-card"><div class="q-num">QUESTION ' + (currentIndex+1) + '</div>' +
            '<div class="question-text">' + questionText + '</div><div class="rating-row">' + ratingHtml + '</div></div>' +
            '<div class="nav-buttons"><button class="btn btn-outline" id="prevBtn"' + (currentIndex===0 ? ' disabled' : '') + '>◀ 上一题</button>' +
            '<button class="btn btn-primary" id="nextBtn">' + (currentIndex===TOTAL_QS-1 ? '✨ 完成测试 ✨' : '下一题 ▶') + '</button></div></div>';
        
        document.querySelectorAll('.rating-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                answers[currentIndex] = parseInt(this.getAttribute('data-score'));
                renderQuiz();
            });
        });
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.addEventListener('click', () => { if(currentIndex>0){ currentIndex--; renderQuiz(); } });
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.addEventListener('click', () => {
            if(answers[currentIndex]===null){ alert("请先选择评分 (1~5)"); return; }
            if(currentIndex===TOTAL_QS-1){ computeMatch(); renderResult(); }
            else { currentIndex++; renderQuiz(); }
        });
    }

    function renderResult() {
        if(!matchedCharacter || !stdScores) return;
        const role = matchedCharacter;
        let visualHtml = '';
        if (role.imgUrl && role.imgUrl.trim() !== '') {
            visualHtml = `<img src="${role.imgUrl}" class="result-image" alt="${role.name}" onerror="this.onerror=null; this.src=''; this.outerHTML='${generateRoleSVG(role).replace(/'/g, "\\'")}';">`;
        } else {
            visualHtml = generateRoleSVG(role);
        }
        
        const chartItems = [
            { label: "开放性 Openness", score: stdScores.O },
            { label: "尽责性 Conscientiousness", score: stdScores.C },
            { label: "外向性 Extraversion", score: stdScores.E },
            { label: "宜人性 Agreeableness", score: stdScores.A },
            { label: "神经质 Neuroticism", score: stdScores.N }
        ];
        let barsHtml = '';
        for (let i=0; i<chartItems.length; i++) {
            barsHtml += '<div class="chart-item">' +
                '<div class="chart-label"><span>' + chartItems[i].label + '</span><span>' + Math.round(chartItems[i].score) + '</span></div>' +
                '<div class="bar-bg"><div class="bar-fill" style="width: ' + chartItems[i].score + '%;"></div></div>' +
            '</div>';
        }
        
        app.innerHTML = '<div class="hero"><h1>✨ 你的灵魂角色 ✨</h1><p>大五人格映射 · 专属戏剧人格</p></div>' +
            '<div class="result-area">' +
            '<div class="character-visual-box">' + visualHtml + '</div>' +
            '<div class="character-name">' + role.name + '</div>' +
            '<div class="character-desc">' + role.desc + '</div>' +
            '<div class="style-note">🎨 形象灵感：' + role.styleNote + '</div>' +
            '<div class="scores-chart"><h3 style="margin-bottom:1rem;">📊 五维度剖面图</h3>' + barsHtml + '</div>' +
            '<button class="reset-btn" id="restartBtn">🔄 重新测试</button>' +
            '</div>' +
            '<footer>Cloud² 测试 · 基于大五人格匹配音乐剧角色</footer>';
        
        const resetBtn = document.getElementById('restartBtn');
        if (resetBtn) resetBtn.addEventListener('click', () => {
            currentMode = null;
            answers.fill(null);
            currentIndex = 0;
            matchedCharacter = null;
            stdScores = null;
            renderEntry();
        });
    }

    renderEntry();
})();
</script>
